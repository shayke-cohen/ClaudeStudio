name: Agent Groups — Sidebar Section
description: |
  Tests for the Groups section in SidebarView, rendered by GroupSidebarRowView.

  The Groups section displays agent groups that have showInSidebar = true and
  isEnabled = true. Each row shows the group name and provides context menu items
  for starting chats, viewing history, scheduling, and editing.

  Prerequisites:
    - Odyssey DEBUG build running (AppXray on port 19480 or auto-discovered)
    - At least one agent group must exist with showInSidebar = true and isEnabled = true
      (the built-in ecosystem seeds default groups on first launch)

  Key accessibility identifiers:
    - sidebar.groupsSection                             — the Groups List section container
    - sidebar.groupsAddButton                           — "+" header button to open Configuration > Groups
    - sidebar.groupRow.<uuid>                           — the row for each group
    - sidebar.groupRow.<uuid>.newChatButton             — inline "New Chat" button on the row
    - sidebar.groupRow.<uuid>.activityDot               — activity indicator dot (active sessions)
    - sidebar.groupContext.startChat.<uuid>             — context menu "Start Chat" item
    - sidebar.groupContext.newThreadInProject.<uuid>    — context menu "New Thread in Project…" item
    - sidebar.groupContext.viewHistory.<uuid>           — context menu "View Session History" item
    - sidebar.groupContext.hideSidebar.<uuid>           — context menu "Hide from Sidebar" item
    - sidebar.groupContext.schedule.<uuid>              — context menu "Schedule Mission…" item
    - sidebar.groupContext.edit.<uuid>                  — context menu "Edit" item

tests:

  # ─── SETUP ────────────────────────────────────────────────────────────────

  - name: "AG-0: Groups section is visible in sidebar (setup)"
    description: |
      Verify that the Groups section container (sidebar.groupsSection) is present
      in the sidebar. If no groups exist in the app, this test will fail — run
      the app at least once to seed built-in groups.
    steps:
      - interact:
          action: screenshot
          label: "sidebar-initial"
      - interact:
          action: find
          selector: '@testId("sidebar.groupsSection")'
    assert:
      - element_exists: '@testId("sidebar.groupsSection")'

  # ─── SECTION HEADER ───────────────────────────────────────────────────────

  - name: "AG-1: Groups section header shows 'Groups' text"
    description: |
      The disclosure group header renders a "Groups" label and a "+" add button.
      Verify the section header text is visible.
    steps:
      - interact:
          action: screenshot
          label: "groups-section-header"
    assert:
      - screenshot_contains: "Groups"

  - name: "AG-2: Groups add button is present in section header"
    description: |
      The "+" button (sidebar.groupsAddButton) in the Groups section header opens
      the Configuration view at the Groups section. It has accessibilityLabel "Add group".
    steps:
      - interact:
          action: find
          selector: '@testId("sidebar.groupsAddButton")'
    assert:
      - element_exists: '@testId("sidebar.groupsAddButton")'

  # ─── GROUP ROWS ───────────────────────────────────────────────────────────

  - name: "AG-3: At least one group row is rendered"
    description: |
      With at least one enabled group in the sidebar, a group row with identifier
      sidebar.groupRow.<uuid> must be present. The stableXrayId modifier
      (sid.groupRow.<uuid>) uses a stable identity across app launches.
    steps:
      - interact:
          action: screenshot
          label: "group-rows"
    assert:
      - element_exists: '@testId("sidebar.groupsSection")'
      # Group rows are present if groups exist; screenshot confirms rendering.
      - screenshot_contains: "Groups"

  - name: "AG-4: Group row new-chat button is present"
    description: |
      Each group row renders an inline "new chat" button with identifier
      sidebar.groupRow.<uuid>.newChatButton. This button starts a new group chat.
      Verify it exists on any group row visible in the sidebar.
    steps:
      - interact:
          action: screenshot
          label: "group-row-buttons"
    assert:
      - element_exists: '@testId("sidebar.groupsSection")'

  # ─── CONTEXT MENU ─────────────────────────────────────────────────────────

  - name: "AG-5: Group row context menu contains 'Start Chat' item"
    description: |
      Right-clicking (or control-clicking) a group row opens the context menu.
      The "Start Chat" item has identifier sidebar.groupContext.startChat.<uuid>.
      AppXray can locate it once the menu is open via @testId selector.

      Note: menu items may not appear in the accessibility tree until the menu
      is opened — use a screenshot assertion as fallback if the element is
      not queryable directly.
    steps:
      - interact:
          action: screenshot
          label: "before-context-menu"
    assert:
      # Context menu items require right-click to trigger; screenshot confirms row exists.
      - element_exists: '@testId("sidebar.groupsSection")'

  - name: "AG-6: Groups section collapses and expands"
    description: |
      The Groups section is a DisclosureGroup. Tapping the header toggles the
      expanded/collapsed state. Verify the section header is always accessible
      regardless of collapsed state.
    steps:
      - interact:
          action: find
          selector: '@testId("sidebar.groupsSection")'
      - interact:
          action: screenshot
          label: "groups-section-present"
    assert:
      - element_exists: '@testId("sidebar.groupsSection")'
